name: Sync custom skills to custom-skills branch

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'general-sci-writing/**'
      - 'review-writing/**'
      - 'reviewer-response-sci/**'
      - 'nsfc-proposal/**'
      - 'reviewer-simulator/**'
      - 'sci2doc/**'
      - 'revise-sci/**'
      - 'polish-sci/**'
      - 'idea-bomb/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Assert citation_guard_core.py is byte-identical across all skills
        run: |
          # 唯一真源守卫:7 个文献反验证技能共享同一份 citation_guard_core.py。
          # 任一份漂移(改 core 漏同步某技能)即失败,阻断 custom-skills 同步。
          mapfile -t cores < <(find general-sci-writing review-writing sci2doc reviewer-simulator \
            reviewer-response-sci revise-sci nsfc-proposal -name citation_guard_core.py | sort)
          if [ "${#cores[@]}" -ne 7 ]; then
            echo "::error::expected 7 citation_guard_core.py, found ${#cores[@]}"; printf '%s\n' "${cores[@]}"; exit 1
          fi
          uniq_count=$(md5sum "${cores[@]}" | awk '{print $1}' | sort -u | wc -l)
          if [ "$uniq_count" -ne 1 ]; then
            echo "::error::citation_guard_core.py diverged across skills:"; md5sum "${cores[@]}"; exit 1
          fi
          echo "✅ all 7 citation_guard_core.py identical ($(md5sum "${cores[0]}" | awk '{print $1}'))"

      - name: Assert extract_docx_images.py is byte-identical across all skills
        run: |
          # 唯一真源守卫:polish-sci/revise-sci/sci2doc 共享同一份 extract_docx_images.py。
          # 任一份漂移(改抠图脚本漏同步某技能)即失败,阻断 custom-skills 同步。
          mapfile -t extractors < <(find polish-sci revise-sci sci2doc \
            -name extract_docx_images.py | sort)
          if [ "${#extractors[@]}" -ne 3 ]; then
            echo "::error::expected 3 extract_docx_images.py, found ${#extractors[@]}"; printf '%s\n' "${extractors[@]}"; exit 1
          fi
          uniq_count=$(md5sum "${extractors[@]}" | awk '{print $1}' | sort -u | wc -l)
          if [ "$uniq_count" -ne 1 ]; then
            echo "::error::extract_docx_images.py diverged across skills:"; md5sum "${extractors[@]}"; exit 1
          fi
          echo "✅ all 3 extract_docx_images.py identical ($(md5sum "${extractors[0]}" | awk '{print $1}'))"

      - name: Sync 9 custom skills to custom-skills branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 切到 custom-skills 分支
          git checkout custom-skills

          # 删除旧版，从 main 拉取最新
          rm -rf general-sci-writing review-writing reviewer-response-sci \
                 nsfc-proposal reviewer-simulator sci2doc revise-sci polish-sci idea-bomb
          git checkout main -- \
                 general-sci-writing review-writing reviewer-response-sci \
                 nsfc-proposal reviewer-simulator sci2doc revise-sci polish-sci idea-bomb

          # 有变化才提交
          git add general-sci-writing review-writing reviewer-response-sci \
                  nsfc-proposal reviewer-simulator sci2doc revise-sci polish-sci idea-bomb
          if git diff --staged --quiet; then
            echo "No changes to custom skills, skipping commit."
          else
            git commit -m "sync: update custom skills from main"
            git push origin custom-skills
            echo "✅ custom-skills branch updated."
          fi
