name: Sync custom skills to custom-skills branch

on:
  push:
    branches: [main]
    paths:
      - 'general-sci-writing/**'
      - 'review-writing/**'
      - 'reviewer-response-sci/**'
      - 'nsfc-proposal/**'
      - 'reviewer-simulator/**'
      - 'sci2doc/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync 6 custom skills to custom-skills branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 切到 custom-skills 分支
          git checkout custom-skills

          # 删除旧版，从 main 拉取最新
          rm -rf general-sci-writing review-writing reviewer-response-sci \
                 nsfc-proposal reviewer-simulator sci2doc
          git checkout main -- \
                 general-sci-writing review-writing reviewer-response-sci \
                 nsfc-proposal reviewer-simulator sci2doc

          # 有变化才提交
          git add general-sci-writing review-writing reviewer-response-sci \
                  nsfc-proposal reviewer-simulator sci2doc
          if git diff --staged --quiet; then
            echo "No changes to custom skills, skipping commit."
          else
            git commit -m "sync: update custom skills from main"
            git push origin custom-skills
            echo "✅ custom-skills branch updated."
          fi
